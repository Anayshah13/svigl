services:
  backend:
    build:
      context: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
      - backend/.env.local
    # Dev-only: mount only the application package so host edits map 1:1 into
    # the container without masking installed deps from the image.
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
    # Dev-only: run as root so Windows/OneDrive bind mounts stay readable inside
    # the container (the Dockerfile's non-root USER can block seeing live edits).
    user: "0:0"
    # Dev-only: restart the server when Python files change under app/.
    # Absolute --reload-dir avoids ambiguous resolution inside the mount.
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--reload-dir",
        "/app/app",
      ]
    environment:
      DEBUG: "true"
      # Docker Desktop (especially on Windows/macOS) often misses inotify events
      # on bind mounts; polling ensures reload still triggers on file saves.
      WATCHFILES_FORCE_POLLING: "true"
      WATCHFILES_POLLING_INTERVAL_MS: "500"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17
    env_file:
      - .env
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
