# Railway config-as-code.
# In the Railway dashboard, set this service's Root Directory to `/backend`.
#
# CRITICAL (502 fix): Settings → Networking → public domain → Target Port = 8080
# (must match the PORT the container listens on; see Dockerfile ENV PORT=8080).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
